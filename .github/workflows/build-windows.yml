name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Ensure compatibility

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Playwright browsers
      run: playwright install chromium

    - name: Generate embedded secrets
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
      run: |
        python -c "import os, json; sheet=os.environ.get('GOOGLE_SHEET_ID',''); cred=os.environ.get('GSPREAD_CREDENTIALS','{}'); d=json.loads(cred) if cred else {}; open('src/embedded_credentials.py','w',encoding='utf-8').write(f'SECRETS = {{\n    \"GOOGLE_SHEET_ID\": {repr(sheet)},\n    \"CREDENTIALS_DICT\": {repr(d)}\n}}\n')"

    - name: Prepare default config.json
      run: |
        echo "{}" > config.json

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed `
          --name "NamcoBot" `
          --add-data "src;src" `
          --add-data "config.json;." `
          --hidden-import=playwright `
          --hidden-import=playwright.async_api `
          --hidden-import=gspread `
          --hidden-import=dotenv `
          --hidden-import=pycparser `
          --hidden-import=cffi `
          --hidden-import=cryptography `
          --hidden-import=google.auth `
          --hidden-import=google.oauth2.service_account `
          --collect-all playwright `
          gui.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NamcoBot-Windows-Release
        path: dist/NamcoBot/
